name: Build Debug APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '版本标签（如 v0.1.55）'
        required: false
        default: 'debug'

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64-v8a
            rust-target: aarch64-linux-android
            flutter-target: android-arm64
          - arch: armeabi-v7a
            rust-target: armv7-linux-androideabi
            flutter-target: android-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Android build environment
        run: |
          rustup target add ${{ matrix.rust-target }}
          cargo install cargo-ndk
          sudo apt-get update && sudo apt-get install -y cmake

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'ndk;25.2.9519653'

      - name: Build DOH Proxy
        working-directory: core/doh_proxy
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/25.2.9519653
        run: cargo ndk -t ${{ matrix.arch }} --platform 28 build --release --features ech

      - name: Copy native libraries
        run: |
          mkdir -p android/app/src/main/jniLibs/${{ matrix.arch }}
          cp core/doh_proxy/target/${{ matrix.rust-target }}/release/libdoh_proxy.so android/app/src/main/jniLibs/${{ matrix.arch }}/
          mkdir -p android/app/src/main/res/raw
          cp core/doh_proxy/certs/ca.der android/app/src/main/res/raw/proxy_ca.der

      - name: Get dependencies
        run: flutter pub get

      - name: Build Debug APK
        run: |
          flutter build apk --debug --target-platform ${{ matrix.flutter-target }}
          mkdir -p dist
          mv build/app/outputs/flutter-apk/app-debug.apk dist/fluxdo-debug-${{ matrix.arch }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ matrix.arch }}
          path: dist/fluxdo-debug-${{ matrix.arch }}.apk
          retention-days: 14
